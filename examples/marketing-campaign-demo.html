<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Ops — Full-Funnel Campaign Simulator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b10;--s1:#12141c;--s2:#1a1d28;--s3:#232736;
  --bdr:#272b3d;--bdr2:#1e2132;
  --tx:#e4e6ee;--tx2:#7a7f96;--tx3:#4e5268;
  --acc:#7c3aed;--acc2:#a78bfa;--acc-bg:#7c3aed14;
  --green:#10b981;--gbg:#10b98114;--red:#ef4444;--rbg:#ef444414;
  --yellow:#f59e0b;--ybg:#f59e0b14;--blue:#3b82f6;--bbg:#3b82f614;
  --cyan:#06b6d4;--cbg:#06b6d414;--pink:#ec4899;--pbg:#ec489914;
  --orange:#f97316;--obg:#f9731614;
  --r:10px;--rs:7px;
  --mono:'SF Mono',Menlo,Consolas,monospace;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;min-height:100vh;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.2rem;border-bottom:1px solid var(--bdr);background:var(--s1)}
.hdr h1{font-size:.95rem;font-weight:700;letter-spacing:-.01em}
.hdr h1 span{color:var(--acc2)}
.hdr-right{display:flex;gap:.5rem;align-items:center}
.run-btn{padding:.4rem 1rem;border-radius:99px;border:none;background:var(--acc);color:#fff;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
.run-btn:hover{background:#6d28d9}
.run-btn:disabled{opacity:.3;cursor:not-allowed}
.scenario-sel{padding:.35rem .6rem;border-radius:var(--rs);border:1px solid var(--bdr);background:var(--s2);color:var(--tx);font-size:.78rem;cursor:pointer}
.scenario-sel:focus{outline:1px solid var(--acc)}

/* Metrics strip */
.mstrip{display:flex;gap:0;border-bottom:1px solid var(--bdr);overflow-x:auto}
.mstrip .m{flex:1;min-width:110px;padding:.6rem .8rem;border-right:1px solid var(--bdr);text-align:center}
.mstrip .m:last-child{border-right:none}
.mstrip .mv{font-size:1.05rem;font-weight:700}
.mstrip .ml{font-size:.62rem;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-top:.1rem}
.mstrip .md{font-size:.6rem;font-weight:600;margin-top:.15rem}
.md.up{color:var(--green)}.md.dn{color:var(--red)}.md.ne{color:var(--yellow)}

/* Main layout */
.main{display:grid;grid-template-columns:220px 1fr 320px;height:calc(100vh - 94px);overflow:hidden}
@media(max-width:1000px){.main{grid-template-columns:1fr;height:auto}}

/* Left panel */
.left{border-right:1px solid var(--bdr);overflow-y:auto;display:flex;flex-direction:column}
.panel-title{font-size:.68rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding:.65rem .75rem .3rem;font-weight:700}

/* Integration nodes */
.int-node{display:flex;align-items:center;gap:.55rem;padding:.45rem .75rem;border-bottom:1px solid var(--bdr2);transition:background .2s}
.int-node:hover{background:var(--s2)}
.int-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.int-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.int-dot.off{background:var(--tx3)}
.int-dot.warn{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.int-info{min-width:0}
.int-info strong{font-size:.75rem;display:block}
.int-info span{font-size:.62rem;color:var(--tx2)}
.int-badge{margin-left:auto;font-size:.58rem;padding:.1rem .35rem;border-radius:99px;font-weight:600;flex-shrink:0}
.int-badge.sync{background:var(--gbg);color:var(--green)}
.int-badge.idle{background:var(--s3);color:var(--tx3)}
.int-badge.push{background:var(--bbg);color:var(--blue)}

/* Funnel */
.funnel{padding:.6rem .75rem}
.fun-stage{display:flex;align-items:center;gap:.5rem;padding:.35rem 0;position:relative}
.fun-bar{height:6px;border-radius:3px;transition:width .8s ease,background .3s}
.fun-lbl{font-size:.68rem;min-width:52px;text-align:right;color:var(--tx2)}
.fun-val{font-size:.72rem;font-weight:700;min-width:42px}
.fun-pct{font-size:.6rem;color:var(--tx2);min-width:32px}
.fun-arrow{text-align:center;color:var(--tx3);font-size:.6rem;padding:.1rem 0;padding-left:56px}

/* Center panel */
.center{overflow-y:auto;display:flex;flex-direction:column}
.tabs{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0}
.tab{padding:.55rem .9rem;font-size:.75rem;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;font-weight:500;transition:all .15s}
.tab:hover{color:var(--tx)}
.tab.active{color:var(--acc2);border-color:var(--acc)}
.tab-body{flex:1;overflow-y:auto}
.tab-pane{display:none;padding:.6rem}
.tab-pane.active{display:block}

/* Agent logs */
.log-entry{padding:.55rem .65rem;border-bottom:1px solid var(--bdr2);opacity:0;transform:translateX(-8px);transition:all .35s;font-size:.77rem}
.log-entry.show{opacity:1;transform:translateX(0)}
.log-top{display:flex;align-items:center;gap:.45rem;margin-bottom:.3rem}
.log-time{font-family:var(--mono);font-size:.62rem;color:var(--tx3);min-width:52px}
.log-agent{font-size:.65rem;padding:.1rem .4rem;border-radius:99px;font-weight:600;color:#fff}
.log-agent.growth{background:#7c3aed}.log-agent.content{background:#f59e0b}.log-agent.twitter{background:#1DA1F2}
.log-agent.tiktok{background:#333}.log-agent.instagram{background:#E4405F}.log-agent.reddit{background:#FF4500}
.log-agent.aso{background:#3b82f6}.log-agent.social{background:#10b981}.log-agent.system{background:#4e5268}
.log-agent.email{background:#06b6d4}.log-agent.crm{background:#f97316}.log-agent.ads{background:#ec4899}
.log-agent.analytics{background:#6366f1}
.log-type{font-size:.6rem;color:var(--tx3);margin-left:auto;font-family:var(--mono)}
.log-body{color:var(--tx);line-height:1.55}
.log-body .hl{color:var(--green);font-weight:600}
.log-body .warn{color:var(--yellow);font-weight:600}
.log-body .err{color:var(--red);font-weight:600}
.log-body .dim{color:var(--tx2)}
.log-body .val{color:var(--acc2);font-weight:600}
.log-body .data{font-family:var(--mono);font-size:.7rem;background:var(--s2);padding:.25rem .45rem;border-radius:4px;display:block;margin-top:.3rem;line-height:1.6;color:var(--tx2);white-space:pre-wrap}

/* Lead table */
.lead-tbl{width:100%;border-collapse:collapse;font-size:.72rem}
.lead-tbl th{text-align:left;padding:.45rem .5rem;border-bottom:1px solid var(--bdr);color:var(--tx2);font-weight:600;font-size:.65rem;text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0;background:var(--s1)}
.lead-tbl td{padding:.4rem .5rem;border-bottom:1px solid var(--bdr2);vertical-align:top}
.lead-tbl tr{transition:background .2s}
.lead-tbl tr:hover{background:var(--s2)}
.lead-tbl tr.promoted{animation:promote .6s ease}
@keyframes promote{0%{background:var(--gbg)}100%{background:transparent}}
.stage-pill{font-size:.6rem;padding:.12rem .4rem;border-radius:99px;font-weight:600;white-space:nowrap}
.stage-pill.visitor{background:var(--s3);color:var(--tx3)}
.stage-pill.lead{background:var(--bbg);color:var(--blue)}
.stage-pill.mql{background:var(--cbg);color:var(--cyan)}
.stage-pill.sql{background:var(--acc-bg);color:var(--acc2)}
.stage-pill.opp{background:var(--ybg);color:var(--yellow)}
.stage-pill.customer{background:var(--gbg);color:var(--green)}
.stage-pill.lost{background:var(--rbg);color:var(--red)}
.score-bar{width:50px;height:4px;background:var(--s3);border-radius:2px;display:inline-block;vertical-align:middle;margin-left:.3rem}
.score-fill{height:100%;border-radius:2px;transition:width .5s}
.touch-list{font-size:.62rem;color:var(--tx2);line-height:1.5}
.touch-list span{display:block}

/* Automation flow */
.auto-flow{padding:.4rem}
.auto-seq{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);padding:.7rem;margin-bottom:.65rem}
.auto-seq .seq-title{font-size:.78rem;font-weight:600;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.auto-seq .seq-title .pill{font-size:.58rem;padding:.1rem .35rem;border-radius:99px}
.seq-steps{position:relative;padding-left:14px}
.seq-step{position:relative;padding:.3rem 0 .3rem .8rem;font-size:.72rem;border-left:2px solid var(--bdr)}
.seq-step:last-child{border-left-color:transparent}
.seq-step::before{content:'';position:absolute;left:-5px;top:.45rem;width:8px;height:8px;border-radius:50%;background:var(--bdr);border:2px solid var(--s2)}
.seq-step.done::before{background:var(--green);border-color:var(--green)}
.seq-step.active::before{background:var(--acc);border-color:var(--acc);box-shadow:0 0 6px var(--acc)}
.seq-step.skip::before{background:var(--tx3)}
.seq-step .s-label{font-weight:600;font-size:.72rem}
.seq-step .s-detail{font-size:.65rem;color:var(--tx2);margin-top:.1rem}
.seq-step .s-metric{font-size:.62rem;color:var(--green);font-weight:600;margin-top:.1rem}
.seq-branch{margin:.25rem 0 .25rem 1rem;padding:.3rem .5rem;background:var(--s1);border-radius:4px;font-size:.65rem;border-left:2px solid var(--yellow)}
.seq-branch .b-cond{color:var(--yellow);font-weight:600}
.seq-branch .b-yes{color:var(--green)}
.seq-branch .b-no{color:var(--red)}

/* Right panel: Attribution & Revenue */
.right{border-left:1px solid var(--bdr);overflow-y:auto}
.attr-card{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);padding:.65rem;margin:.5rem .6rem}
.attr-card .ac-title{font-size:.72rem;font-weight:600;margin-bottom:.4rem}
.attr-row{display:flex;align-items:center;gap:.4rem;padding:.2rem 0;font-size:.68rem}
.attr-row .ar-ch{min-width:80px;color:var(--tx2)}
.attr-row .ar-bar{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.attr-row .ar-fill{height:100%;border-radius:3px;transition:width .6s}
.attr-row .ar-pct{min-width:30px;text-align:right;font-weight:600;font-size:.65rem}

/* Revenue timeline */
.rev-item{display:flex;gap:.5rem;padding:.35rem .6rem;border-bottom:1px solid var(--bdr2);font-size:.7rem;align-items:flex-start}
.rev-item .ri-time{font-family:var(--mono);font-size:.6rem;color:var(--tx3);min-width:44px;padding-top:.05rem}
.rev-item .ri-body{flex:1}
.rev-item .ri-amt{font-weight:700;color:var(--green)}
.rev-item .ri-loss{font-weight:700;color:var(--red)}

/* Conversion path */
.cpath{padding:.5rem .6rem}
.cp-lead{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);padding:.6rem;margin-bottom:.6rem}
.cp-lead .cp-name{font-size:.78rem;font-weight:600}
.cp-lead .cp-co{font-size:.65rem;color:var(--tx2)}
.cp-lead .cp-rev{font-size:.85rem;font-weight:700;color:var(--green);margin-top:.2rem}
.cp-touches{padding-left:.5rem;margin-top:.4rem}
.cp-touch{position:relative;padding:.25rem 0 .25rem .8rem;font-size:.65rem;border-left:2px solid var(--bdr);color:var(--tx2)}
.cp-touch::before{content:'';position:absolute;left:-4px;top:.4rem;width:6px;height:6px;border-radius:50%;background:var(--bdr)}
.cp-touch:last-child{border-left-color:transparent}
.cp-touch strong{color:var(--tx);font-weight:600}
.cp-touch .t-ch{color:var(--acc2)}
</style>
</head>
<body>

<div class="hdr">
  <h1>Marketing <span>Ops</span> &mdash; Full-Funnel Simulator</h1>
  <div class="hdr-right">
    <select class="scenario-sel" id="scSel">
      <option value="b2b">B2B SaaS Full-Funnel</option>
      <option value="plg">Product-Led Growth</option>
      <option value="abm">Enterprise ABM</option>
    </select>
    <button class="run-btn" id="runBtn">Run Simulation</button>
  </div>
</div>

<div class="mstrip" id="mstrip"></div>

<div class="main">
  <!-- LEFT -->
  <div class="left">
    <div class="panel-title">Integrations</div>
    <div id="intNodes"></div>
    <div class="panel-title" style="margin-top:.3rem">Funnel</div>
    <div class="funnel" id="funnel"></div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="tabs">
      <div class="tab active" data-tab="logs">Agent Logs</div>
      <div class="tab" data-tab="leads">Lead Pipeline</div>
      <div class="tab" data-tab="auto">Automations</div>
    </div>
    <div class="tab-body">
      <div class="tab-pane active" id="pane-logs"></div>
      <div class="tab-pane" id="pane-leads"><table class="lead-tbl"><thead><tr><th>Lead</th><th>Company</th><th>Score</th><th>Stage</th><th>Source</th><th>Last Action</th></tr></thead><tbody id="leadBody"></tbody></table></div>
      <div class="tab-pane" id="pane-auto"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="panel-title">Attribution</div>
    <div id="attrPanel"></div>
    <div class="panel-title">Revenue Events</div>
    <div id="revPanel"></div>
    <div class="panel-title">Conversion Path</div>
    <div id="cpathPanel"></div>
  </div>
</div>

<script>
/* ── DATA ─────────────────────────────────────────── */

const INTEGRATIONS = [

const FUNNEL_STAGES = [

  {id:"opp",label:"Opportunity",color:"var(--yellow)"},
  {id:"customer",label:"Customer",color:"var(--green)"},

const SCENARIOS = {
b2b: {
  name:"B2B SaaS Full-Funnel",
  metrics:[

  ],
  leads:[

    {name:"James Morton",co:"QuantumLeap AI (180 emp)",score:0,endScore:67,stage:"visitor",endStage:"sql",src:"Reddit r/MachineLearning",touches:["Reddit: commented on orchestration post","Blog: 'Agent Memory Patterns' (organic)","Pricing page (1 visit)","Free trial started","Email: Onboarding sequence opened","In-app: connected 3 integrations","Lead score triggered MQL at 45","SDR outreach: accepted meeting"]},

    {name:"Tom Wheeler",co:"CloudPeak (340 emp)",score:0,endScore:23,stage:"visitor",endStage:"lost",src:"Google Organic",touches:["Blog: '7 Orchestration Frameworks' (organic)","Visited pricing, bounced in 8 seconds","Email: not subscribed","Retargeting ad: showed but no click","Classified: not ICP (wrong industry)"]},
  ],
  logs:[
    {t:"09:00:01",agent:"system",type:"INIT",body:"Campaign <span class='val'>Q1-2026-B2B-FULL-FUNNEL</span> initialized. Connected integrations: <span class='hl'>10/10 healthy</span>. Tracking pixels verified on 14 pages. UTM parameters configured for 6 channels. Segment event schema validated."},

    {t:"09:01:18",agent:"ads",type:"CAMPAIGN_CREATE",body:"Meta retargeting campaign launched:<span class='data'>Campaign: \"Retarget-Pricing-Visitors\"\n  Audience: Custom — visited /pricing but did NOT start trial (last 14 days)\n  Lookalike: 1% of closed-won customers (US, UK, DE)\n  Creative: 3 variants (testimonial, product demo, comparison)\n  Pixel events: ViewContent, InitiateCheckout, StartTrial\n  Frequency cap: 3/week | Budget: $180/day\n  Attribution: 7-day click, 1-day view</span>"},

/* ── RENDER ────────────────────────────────────────── */

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function renderIntegrations() {
  $("#intNodes").innerHTML = INTEGRATIONS.map(n => `
    <div class="int-node" id="int-${n.id}">
      <div class="int-dot ${n.status}"></div>
      <div class="int-info"><strong>${n.name}</strong><span>${n.detail}</span></div>
      <div class="int-badge ${n.badge}">${n.badge}</div>
    </div>`).join("");
}

function renderFunnel(stages) {
  const max = stages[0]?.val || 1;
  let html = "";
  stages.forEach((s, i) => {
    const w = Math.max(8, (s.val / max) * 100);
    const pct = i > 0 ? ((s.val / stages[i-1].val) * 100).toFixed(1) + "%" : "100%";
    const st = FUNNEL_STAGES.find(f => f.id === s.stage);
    html += `<div class="fun-stage">
      <div class="fun-lbl">${st?.label || s.stage}</div>
      <div class="fun-bar" id="fb-${s.stage}" style="width:${w}%;background:${st?.color || '#555'};flex-shrink:0"></div>
      <div class="fun-val" id="fv-${s.stage}">${s.val > 999 ? (s.val/1000).toFixed(1)+"K" : s.val}</div>
      <div class="fun-pct">${pct}</div>
    </div>`;
    if (i < stages.length - 1) html += `<div class="fun-arrow">\u2193 ${((stages[i+1].val / s.val)*100).toFixed(1)}%</div>`;
  });
  $("#funnel").innerHTML = html;
}

function renderMetrics(sc) {
  $("#mstrip").innerHTML = sc.metrics.map((m, i) => `
    <div class="m"><div class="mv" id="mv-${i}">${m.val}</div><div class="ml">${m.label}</div><div class="md" id="md-${i}"></div></div>`).join("");
}

function renderLeads(leads) {
  const body = $("#leadBody");
  body.innerHTML = leads.map((l, i) => {
    const sc = l.endScore;
    const col = sc >= 70 ? "var(--green)" : sc >= 40 ? "var(--yellow)" : "var(--tx3)";
    const stCls = l.endStage === "customer" ? "customer" : l.endStage === "opp" ? "opp" : l.endStage === "sql" ? "sql" : l.endStage === "mql" ? "mql" : l.endStage === "lead" ? "lead" : l.endStage === "lost" ? "lost" : "visitor";
    return `<tr id="lead-${i}">
      <td><strong>${l.name}</strong></td>
      <td style="font-size:.68rem;color:var(--tx2)">${l.co}</td>
      <td><span id="ls-${i}">0</span><div class="score-bar"><div class="score-fill" id="sf-${i}" style="width:0%;background:${col}"></div></div></td>
      <td><span class="stage-pill ${stCls}" id="sp-${i}">visitor</span></td>
      <td style="font-size:.68rem;color:var(--tx2)">${l.src}</td>
      <td style="max-width:180px"><div class="touch-list" id="tl-${i}"></div></td>
    </tr>`;
  }).join("");
}

function renderAutomations(autos) {
  const pane = $("#pane-auto");
  pane.innerHTML = autos.map(a => {
    let stepsHtml = a.steps.map(s => {
      let h = `<div class="seq-step ${s.state}">
        <div class="s-label">${s.label}</div>
        <div class="s-detail">${s.detail}</div>
        ${s.metric ? `<div class="s-metric">${s.metric}</div>` : ""}
      </div>`;
      if (s.branch) {
        h += `<div class="seq-branch"><span class="b-cond">${s.branch.cond}</span><br><span class="b-yes">\u2192 Yes: ${s.branch.yes}</span><br><span class="b-no">\u2192 No: ${s.branch.no}</span></div>`;
      }
      return h;
    }).join("");
    return `<div class="auto-seq">
      <div class="seq-title">${a.name} <span class="pill" style="background:var(--gbg);color:var(--green)">${a.status}</span> <span class="pill" style="background:var(--s3);color:var(--tx2)">${a.enrolled} enrolled</span></div>
      <div class="seq-steps">${stepsHtml}</div>
    </div>`;
  }).join("");
}

function renderAttribution(sc) {
  const panel = $("#attrPanel");
  panel.innerHTML = `<div class="attr-card"><div class="ac-title">Pipeline by Channel (Linear)</div>
    ${sc.attribution.map(a => `<div class="attr-row">
      <div class="ar-ch">${a.channel}</div>
      <div class="ar-bar"><div class="ar-fill" style="width:${a.pct}%;background:${a.color}"></div></div>
      <div class="ar-pct" style="color:${a.color}">${a.value}</div>
    </div>`).join("")}</div>`;
}

function renderRevenue(sc) {
  $("#revPanel").innerHTML = sc.revenue.map(r =>
    `<div class="rev-item"><div class="ri-time">${r.t}</div><div class="ri-body">${r.body}</div></div>`
  ).join("");
}

function renderConversionPaths(sc) {
  $("#cpathPanel").innerHTML = sc.conversionPaths.map(cp =>
    `<div class="cp-lead"><div class="cp-name">${cp.name}</div><div class="cp-co">${cp.co}</div><div class="cp-rev">${cp.rev}</div>
      <div class="cp-touches">${cp.touches.map(t => `<div class="cp-touch"><strong class="t-ch">${t.ch}</strong> — ${t.detail}</div>`).join("")}</div>
    </div>`
  ).join("");
}

/* ── TABS ──────────────────────────────────────────── */
$$(".tab").forEach(t => t.addEventListener("click", () => {
  $$(".tab").forEach(x => x.classList.remove("active"));
  t.classList.add("active");
  $$(".tab-pane").forEach(p => p.classList.remove("active"));
  $(`#pane-${t.dataset.tab}`).classList.add("active");
}));

/* ── SIMULATION ────────────────────────────────────── */

let running = false;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runSimulation() {
  if (running) return;
  running = true;
  const btn = $("#runBtn");
  btn.disabled = true;
  btn.textContent = "Running\u2026";

  const key = $("#scSel").value;
  const sc = SCENARIOS[key];
  const logPane = $("#pane-logs");
  logPane.innerHTML = "";

  $$(".tab").forEach(t => t.classList.remove("active"));
  $$(".tab-pane").forEach(p => p.classList.remove("active"));
  $$(".tab")[0].classList.add("active");
  $("#pane-logs").classList.add("active");

  renderLeads(sc.leads);

  INTEGRATIONS.forEach(n => {
    const dot = $(`#int-${n.id} .int-dot`);
    const badge = $(`#int-${n.id} .int-badge`);
    if (dot) dot.className = "int-dot on";
    if (badge) { badge.className = "int-badge sync"; badge.textContent = "sync"; }
  });

  for (let i = 0; i < sc.logs.length; i++) {
    const log = sc.logs[i];
    const progress = (i + 1) / sc.logs.length;

    const el = document.createElement("div");
    el.className = "log-entry";
    el.innerHTML = `<div class="log-top"><span class="log-time">${log.t}</span><span class="log-agent ${log.agent}">${log.agent.toUpperCase()}</span><span class="log-type">${log.type}</span></div><div class="log-body">${log.body}</div>`;
    logPane.appendChild(el);
    await sleep(30);
    el.classList.add("show");
    logPane.scrollTop = logPane.scrollHeight;

    sc.metrics.forEach((m, mi) => {
      const el = $(`#mv-${mi}`);
      if (el) {
        const parts = m.end.match(/^(\$?)([\d,.]+)(.*)$/);
        if (parts) {
          const num = parseFloat(parts[2].replace(/,/g, ""));
          const cur = num * progress;
          let display;
          if (m.end.includes("K")) display = parts[1] + Math.round(cur) + parts[3];
          else if (num >= 100) display = parts[1] + Math.round(cur).toLocaleString() + parts[3];
          else display = parts[1] + cur.toFixed(1) + parts[3];
          el.textContent = display;
        }
      }
    });

    sc.funnel.forEach(f => {
      const bar = $(`#fb-${f.stage}`);
      const val = $(`#fv-${f.stage}`);
      if (bar) bar.style.width = Math.max(8, (f.val * progress / sc.funnel[0].val) * 100) + "%";
      if (val) {
        const cur = Math.round(f.val * progress);
        val.textContent = cur > 999 ? (cur/1000).toFixed(1) + "K" : cur;
      }
    });

    sc.leads.forEach((l, li) => {
      const touchCount = Math.min(l.touches.length, Math.ceil(l.touches.length * progress));
      const curScore = Math.round(l.endScore * Math.min(1, progress * 1.3));
      const ls = $(`#ls-${li}`);
      const sf = $(`#sf-${li}`);
      const tl = $(`#tl-${li}`);
      if (ls) ls.textContent = curScore;
      if (sf) sf.style.width = curScore + "%";
      if (tl) tl.innerHTML = l.touches.slice(0, touchCount).map(t => `<span>\u2022 ${t}</span>`).join("");
      if (progress > 0.8) {
        const sp = $(`#sp-${li}`);
        if (sp) { sp.textContent = l.endStage; sp.className = `stage-pill ${l.endStage === "customer"?"customer":l.endStage==="lost"?"lost":l.endStage==="opp"?"opp":l.endStage==="sql"?"sql":l.endStage==="mql"?"mql":"lead"}`; }
      }
    });

    await sleep(800 + Math.random() * 400);
  }

  sc.metrics.forEach((m, mi) => {
    const el = $(`#mv-${mi}`);
    if (el) el.textContent = m.end;
    const md = $(`#md-${mi}`);
    if (md) { md.textContent = m.delta; md.className = "md " + m.cls; }
  });

  sc.leads.forEach((l, li) => {
    const ls = $(`#ls-${li}`); if (ls) ls.textContent = l.endScore;
    const sf = $(`#sf-${li}`); if (sf) sf.style.width = l.endScore + "%";
    const sp = $(`#sp-${li}`);
    if (sp) {
      sp.textContent = l.endStage;
      const c = l.endStage==="customer"?"customer":l.endStage==="lost"?"lost":l.endStage==="opp"?"opp":l.endStage==="sql"?"sql":l.endStage==="mql"?"mql":l.endStage==="lead"?"lead":"visitor";
      sp.className = `stage-pill ${c}`;
    }
    const tl = $(`#tl-${li}`); if (tl) tl.innerHTML = l.touches.map(t => `<span>\u2022 ${t}</span>`).join("");
  });

  renderFunnel(sc.funnel);

  btn.disabled = false;
  btn.textContent = "Run Again";
  running = false;
}

/* ── INIT ──────────────────────────────────────────── */

function loadScenario(key) {
  const sc = SCENARIOS[key];
  renderMetrics(sc);
  renderFunnel(sc.funnel.map(f => ({...f, val: 0})));
  renderLeads(sc.leads);
  renderAutomations(sc.automations);
  renderAttribution(sc);
  renderRevenue(sc);
  renderConversionPaths(sc);
  $("#pane-logs").innerHTML = `<div style="text-align:center;color:var(--tx3);padding:2rem;font-size:.82rem">Hit <strong>Run Simulation</strong> to see agent logs stream in real time.</div>`;
}

renderIntegrations();
loadScenario("b2b");
$("#scSel").addEventListener("change", () => { if (!running) loadScenario($("#scSel").value); });
$("#runBtn").addEventListener("click", runSimulation);
</script>
</body>
</html>
